name = "dawnphase-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
APP_URL = "https://www.dawnphase.com"

[[d1_databases]]
binding = "DB"
database_name = "dawnphase-db"
database_id = "ca93dc53-cc61-4f45-9d8d-64971d36301f"

[env.development]
name = "dawnphase-worker-dev"
[env.development.vars]
ENVIRONMENT = "development"

[env.staging]
name = "dawnphase-worker-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

# Cron triggers — free plan allows 5 total across ALL workers.
# Previously commented out due to error 10072 (account at limit).
# Attempt to re-enable here; if deploy fails with 10072 on the
# schedules step, comment these out again and trigger via the HTTP
# endpoints: GET /cron/reminders and GET /cron/monthly instead.
[triggers]
crons = [
  "0 9 * * *",    # daily 09:00 UTC — period reminders
  "0 9 1 * *",    # 09:00 UTC on 1st of each month — monthly reports
]

# Secrets set via: wrangler secret put SECRET_NAME
# JWT_SECRET
# RESEND_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
