name = "dawnphase-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
APP_URL = "https://www.dawnphase.com"

[[d1_databases]]
binding = "DB"
database_name = "dawnphase-db"
database_id = "ca93dc53-cc61-4f45-9d8d-64971d36301f"

[env.development]
name = "dawnphase-worker-dev"
[env.development.vars]
ENVIRONMENT = "development"

[env.staging]
name = "dawnphase-worker-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[triggers]
crons = ["0 9 * * *", "0 9 1 * *"]

# Secrets set via: wrangler secret put SECRET_NAME
# JWT_SECRET
# RESEND_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
